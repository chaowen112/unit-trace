services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-unittrace}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_SSLMODE: disable
      ADDR: ${ADDR:-:8080}
      IMAGE_DIR: ${IMAGE_DIR:-/data/images}
    volumes:
      - imagedata:/data/images

volumes:
  pgdata:
  imagedata:
